name: scrape_stocks
on:
  schedule:
    - cron: '0 21 * * 1-5' # 9pm UTC Monday-Friday
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  queue: max

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - chunk_index: 0
            run_sector_industries: "0"
          - chunk_index: 1
            run_sector_industries: "0"
          - chunk_index: 2
            run_sector_industries: "0"
          - chunk_index: 3
            run_sector_industries: "0"
          - chunk_index: 4
            run_sector_industries: "0"
          - chunk_index: 5
            run_sector_industries: "1"
    defaults:
      run:
        shell: bash
        working-directory: scraper/

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Restore MarketScreener URL cache
        uses: actions/cache/restore@v5
        with:
          path: scraper/marketscreener_links.json
          key: marketscreener-links-${{ github.run_id }}-${{ matrix.chunk_index }}
          restore-keys: |
            marketscreener-links-${{ github.run_id }}-
            marketscreener-links-

      - name: Run the scraping script for dcf
        timeout-minutes: 350
        env:
          MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
          MONGODB_DB_PASSWORD: ${{ secrets.MONGODB_DB_PASSWORD }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          SCRAPE_CHUNK_COUNT: "6"
          SCRAPE_CHUNK_INDEX: ${{ matrix.chunk_index }}
          SCRAPE_CHUNK_SIZE: "900"
          RUN_SECTOR_INDUSTRY_SCRAPE: ${{ matrix.run_sector_industries }}
          TQDM_DISABLE: "1"
        run: uv run main.py

      - name: Save MarketScreener URL cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: scraper/marketscreener_links.json
          key: marketscreener-links-${{ github.run_id }}-${{ matrix.chunk_index }}
